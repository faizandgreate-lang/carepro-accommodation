<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Care-Pro | Free-Pool Workers</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        .freepool-table-container { width: 100%; overflow-x: auto; background: white; border-radius: 20px; padding: 1.5rem; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 4rem; border: 1px solid #e2e8f0; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { text-align: left; background: #f8fafc; padding: 1rem; color: var(--primary); font-size: 0.8rem; text-transform: uppercase; border-bottom: 2px solid #e2e8f0; }
        td { padding: 1rem; border-bottom: 1px solid #f1f5f9; font-size: 0.9rem; color: #475569; }
        tr:hover { background: #f1f7ff; }
        .name-directory { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1200px; padding-bottom: 5rem; }
        .name-box { background: white; border: 1px solid #e2e8f0; height: 180px; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 1.5rem; border-radius: 24px; text-align: center; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
        .name-box:hover { transform: translateY(-8px); border-color: var(--primary); box-shadow: 0 20px 40px rgba(0, 102, 204, 0.1); }
        .name-box h3 { font-size: 1.1rem; color: var(--text-dark); margin: 0; font-weight: 700; }
        .export-btn { position: absolute; top: 2rem; right: 2rem; background: #16a34a; color: white; border: none; padding: 0.8rem 1.5rem; border-radius: 50px; font-weight: 600; cursor: pointer; box-shadow: 0 4px 15px rgba(22, 163, 74, 0.2); transition: all 0.3s; z-index: 10; }
        .export-btn:hover { transform: translateY(-2px); background: #15803d; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); display: flex; justify-content: center; align-items: center; z-index: 3000; }
        .detail-card { background: white; width: 95%; max-width: 700px; padding: 3rem; border-radius: 32px; position: relative; max-height: 85vh; overflow-y: auto; }
        .detail-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 2rem; }
        .detail-item { background: #f8fafc; padding: 1.2rem; border-radius: 16px; border: 1px solid #f1f5f9; }
        .detail-item label { display: block; font-size: 0.7rem; color: #94a3b8; text-transform: uppercase; font-weight: 700; margin-bottom: 0.4rem; }
        .detail-item p { font-weight: 600; color: #1e293b; margin: 0; font-size: 1rem; }
    </style>
</head>
<body class="light-mode">
    <div class="background-blobs"><div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div></div>
    <header style="position:relative;">
        <nav class="top-nav"><a href="index.html" class="nav-link">Main Portal</a><a href="freepool.html" class="nav-link active">Free-Pool</a></nav>
        <button class="export-btn" id="export-excel-btn" onclick="exportToExcel()"><i class="fas fa-file-excel"></i> Export to Excel</button>
        <div class="logo-container"><img src="assets/logo.png" alt="Care-Pro Logo" id="main-logo"></div>
        <h1>Care-Pro Free-Pool</h1>
    </header>
    <main>
        <section class="freepool-table-container">
            <h2 style="margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--text-dark);">WORKER LIST</h2>
            <div id="table-loading" style="text-align:center; padding:3rem; color:var(--text-dim);">Connecting to Database...</div>
            <table id="master-table" class="hidden">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </section>
        <section style="width:100%; max-width:1200px;"><h2 style="margin-bottom: 1.5rem; font-size: 1.5rem; color: var(--text-dark);">DIRECTORY</h2><div id="name-grid" class="name-directory"></div></section>
    </main>
    <div id="detail-modal" class="modal-overlay hidden"><div class="detail-card"><button onclick="closeDetails()" style="position:absolute; top:1.5rem; right:1.5rem; border:none; background:#f1f5f9; width:40px; height:40px; border-radius:50%; cursor:pointer; font-size:1.2rem;">&times;</button><div id="detail-content"></div></div></div>
    <div id="chat-wrapper" class="chat-wrapper">
        <div id="chat-window" class="chat-window hidden glass">
            <div class="chat-header"><h3><i class="fas fa-robot"></i> Care-Pro AI</h3><button onclick="document.getElementById('chat-window').classList.add('hidden')"><i class="fas fa-times"></i></button></div>
            <div id="chat-messages" class="chat-messages"></div>
            <div class="chat-input-area"><input type="text" id="chat-input" placeholder="Type a message..."><button id="send-chat"><i class="fas fa-paper-plane"></i></button></div>
        </div>
        <button class="chat-bubble" onclick="document.getElementById('chat-window').classList.toggle('hidden')"><i class="fas fa-comment-dots"></i></button>
    </div>
    <footer class="footer"><p>&copy; 2024 Care-Pro Workforce Solutions</p></footer>
    <script src="chat.js"></script>
    <script>
        const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRzP7kzkSlt3M4toF34vnyxBdHgQ2J9kM0yTNb4NSL-ZsM9O8vC4M83J4uw-y-DWusEtVBYuHJ-SqMs/pub?output=csv";
        let fullPoolData = [];
        let fullHeaders = [];

        async function initPool() {
            try {
                // Dual connection for Desktop and Vercel
                const res = await fetch(CSV_URL);
                if (!res.ok) throw new Error();
                const csv = await res.text();
                processData(csv);
            } catch (e) {
                const proxyUrl = "https://api.allorigins.win/raw?url=" + encodeURIComponent(CSV_URL);
                const res = await fetch(proxyUrl);
                const csv = await res.text();
                processData(csv);
            }
        }

        function processData(csv) {
            Papa.parse(csv, {
                header: false,
                complete: function(results) {
                    const rows = results.data;
                    if (rows.length >= 2) {
                        fullHeaders = rows[1];
                        fullPoolData = rows.slice(2).filter(r => r.length > 1);
                        renderAll();
                    }
                }
            });
        }

        function renderAll() {
            // TABLE: Limited to Columns A to L (Indices 0-11)
            const tableHeaders = fullHeaders.slice(0, 12);
            document.getElementById('table-head').innerHTML = `<tr>${tableHeaders.map(h => `<th>${h || '---'}</th>`).join('')}</tr>`;
            document.getElementById('table-body').innerHTML = fullPoolData.map(row => `<tr>${row.slice(0, 12).map(cell => `<td>${cell || 'N/A'}</td>`).join('')}</tr>`).join('');
            
            // DIRECTORY: Card shows Name from Column C (Index 2)
            document.getElementById('name-grid').innerHTML = fullPoolData.map((row, index) => `
                <div class="name-box" onclick="showDetails(${index})">
                    <i class="fas fa-user-tie" style="font-size:2rem; color:var(--primary); margin-bottom:1rem; opacity:0.1;"></i>
                    <h3>${row[2] || 'Worker'}</h3>
                    <div style="margin-top:1rem; font-size:0.75rem; color:var(--primary); font-weight:700;">VIEW FULL PROFILE</div>
                </div>
            `).join('');
            
            document.getElementById('table-loading').classList.add('hidden');
            document.getElementById('master-table').classList.remove('hidden');
        }

        window.showDetails = (index) => {
            const row = fullPoolData[index];
            const content = document.getElementById('detail-content');
            // MODAL: Shows UNLIMITED data from ALL columns
            content.innerHTML = `
                <div style="text-align:center; margin-bottom:2.5rem; border-bottom:2px solid #f1f5f9; padding-bottom:1.5rem;">
                    <img src="assets/logo.png" alt="Logo" style="height:55px; margin-bottom:1rem;">
                    <h2 style="color:var(--primary); margin:0;">${row[2] || 'Worker Details'}</h2>
                </div>
                <div class="detail-grid">
                    ${row.map((cell, i) => `
                        <div class="detail-item">
                            <label>${fullHeaders[i] || 'Field'}</label>
                            <p>${cell || '---'}</p>
                        </div>
                    `).join('')}
                </div>
                <button onclick="closeDetails()" style="width:100%; margin-top:2rem; padding:1rem; background:var(--primary); color:white; border:none; border-radius:12px; font-weight:700; cursor:pointer;">CLOSE PROFILE</button>
            `;
            document.getElementById('detail-modal').classList.remove('hidden');
        };

        window.exportToExcel = () => {
            if (fullPoolData.length === 0) return;
            const ws = XLSX.utils.aoa_to_sheet([fullHeaders, ...fullPoolData]);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "FreePool");
            XLSX.writeFile(wb, "CarePro_FreePool_Data.xlsx");
        };

        window.closeDetails = () => document.getElementById('detail-modal').classList.add('hidden');
        initPool();
    </script>
</body>
</html>
